<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Surpresa</title>
    <style>
        /* RESET ABSOLUTO */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body, html { 
            width: 100%; height: 100%; 
            background: #ffffff; 
            overflow: hidden; 
            font-family: 'Georgia', serif; 
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* O CONTAINER QUE RECEBE O CLIQUE EM QUALQUER LUGAR */
        #click-area {
            position: fixed;
            inset: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            cursor: pointer;
        }

        /* TEXTO DE INSTRUÇÃO DISCRETO */
        #instrucao {
            color: #d4af37;
            letter-spacing: 5px;
            font-size: 0.9rem;
            text-transform: uppercase;
            transition: opacity 0.4s;
        }

        /* A FRASE QUE SURGE NO CENTRO */
        #resultado {
            opacity: 0;
            transform: scale(0.8);
            text-align: center;
            transition: all 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: none;
        }

        h1 {
            font-size: 2.2rem;
            color: #1a1a1a;
            font-style: italic;
            font-weight: 400;
        }

        /* BRILHOS LUXUOSOS */
        .sparkle {
            position: fixed;
            width: 4px;
            height: 4px;
            background: #d4af37;
            border-radius: 50%;
            pointer-events: none;
        }
    </style>
</head>
<body id="corpo">

    <div id="click-area" onclick="revelarFrase(event)" ontouchstart="revelarFrase(event)">
        <p id="instrucao">Toque para revelar</p>
    </div>

    <div id="resultado">
        <h1>"E ai, doutorinha. Gostou?"</h1>
        <div style="width: 50px; height: 1px; background: #d4af37; margin: 25px auto 0;"></div>
    </div>

    <script>
        let ativo = false;

        function revelarFrase(e) {
            if (ativo) return;
            ativo = true;

            // Esconde a instrução e mostra a frase
            document.getElementById('instrucao').style.opacity = '0';
            const res = document.getElementById('resultado');
            res.style.opacity = '1';
            res.style.transform = 'scale(1)';

            // Pega a posição do toque
            const x = e.clientX || (e.touches && e.touches[0].clientX);
            const y = e.clientY || (e.touches && e.touches[0].clientY);

            // Explosão de brilho onde a pessoa tocou
            for(let i=0; i<30; i++) {
                const s = document.createElement('div');
                s.className = 'sparkle';
                s.style.left = x + 'px';
                s.style.top = y + 'px';
                document.body.appendChild(s);

                const moveX = (Math.random() - 0.5) * 500;
                const moveY = (Math.random() - 0.5) * 500;

                s.animate([
                    { transform: 'translate(0,0) scale(1)', opacity: 1 },
                    { transform: `translate(${moveX}px, ${moveY}px) scale(0)`, opacity: 0 }
                ], {
                    duration: 1000 + Math.random() * 1
