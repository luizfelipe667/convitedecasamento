<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GEOVANA & FELIPE 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Luckiest+Guy&display=swap" rel="stylesheet">
    <style>
        /* RESET TOTAL PARA NÃO TRAVAR NO MOBILE */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body, html { 
            width: 100%; height: 100%; 
            background: #000; 
            overflow: hidden; 
            font-family: 'Arial', sans-serif;
        }

        /* CAMADA DE ABERTURA (A QUE VOCÊ VÊ PRIMEIRO) */
        #topo {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #ff007f; /* Rosa Choque */
            z-index: 9999; /* No topo de tudo */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border: 15px solid #ffee00;
            cursor: pointer;
            transition: transform 0.8s cubic-bezier(0.9, 0, 0.1, 1);
        }

        /* ANIMAÇÃO DO BOTÃO CENTRAL */
        .botao-animado {
            background: #fff;
            border: 8px solid #000;
            padding: 20px;
            transform: rotate(-5deg);
            box-shadow: 15px 15px 0 #00e5ff;
            animation: balanco 0.5s infinite alternate;
            pointer-events: none; /* O clique passa para o pai */
        }

        @keyframes balanco {
            from { transform: rotate(-5deg) scale(1); }
            to { transform: rotate(5deg) scale(1.1); }
        }

        .texto-click {
            font-family: 'Bangers', cursive;
            font-size: 3rem;
            color: #ff007f;
            text-align: center;
        }

        /* CONVITE (ESCONDIDO ATRÁS) */
        #convite {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #7000ff, #ff007f);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
            padding: 20px;
        }

        .card {
            background: #fff;
            border: 10px solid #000;
            padding: 30px;
            text-align: center;
            box-shadow: 20px 20px 0 #ffee00;
            max-width: 400px;
            width: 100%;
        }

        h1 {
            font-family: 'Luckiest Guy', cursive;
            font-size: 3rem;
            color: #ff007f;
            -webkit-text-stroke: 2px #000;
            margin-bottom: 20px;
        }

        /* ELEMENTOS VOADORES (EXPLOSÃO) */
        .boneco {
            position: fixed;
            font-size: 4rem;
            pointer-events: none;
            z-index: 10000;
        }

        /* TIMER */
        .timer {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
            font-family: 'Bangers', cursive;
        }
        .unidade { background: #00e5ff; padding: 10px; border: 3px solid #000; min-width: 60px; }

        /* ESTADO ABERTO */
        .sumir { transform: translateY(-120%) !important; }
    </style>
</head>
<body id="corpo">
