<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GEOVANA & FELIPE 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Luckiest+Guy&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body, html { 
            width: 100%; height: 100%; 
            background: #ff007f; 
            overflow: hidden; 
            font-family: 'Arial', sans-serif;
        }

        /* ESTE É O SEGREDO: Uma camada invisível acima de TUDO que detecta o toque */
        #detectar-toque-total {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: 9999; /* Fica na frente de absolutamente tudo */
            cursor: pointer;
            background: rgba(0,0,0,0); /* Totalmente invisível */
        }

        /* O visual que você viu na foto */
        #tela-inicial {
            position: fixed;
            inset: 0;
            background: #ff007f;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            border: 15px solid #ffee00;
            transition: transform 0.8s cubic-bezier(0.9, 0, 0.1, 1);
        }

        .caixa-uau {
            background: #fff;
            border: 8px solid #000;
            padding: 30px;
            box-shadow: 15px 15px 0 #00e5ff;
            transform: rotate(-5deg);
            text-align: center;
        }

        .texto-gigante {
            font-family: 'Bangers', cursive;
            font-size: 3rem;
            color: #ff007f;
            line-height: 1;
        }

        /* CONVITE */
        #convite-final {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 90%;
            max-width: 400px;
            background: #fff;
            border: 10px solid #000;
            padding: 30px;
            text-align: center;
            box-shadow: 20px 20px 0 #ffee00;
            display: none;
            z-index: 50;
        }

        h1 { font-family: 'Luckiest Guy', cursive; font-size: 3rem; color: #ff007f; -webkit-text-stroke: 1.5px #000; }

        .timer { display: flex; gap: 10px; justify-content: center; margin-top: 20px; }
        .box { background: #00e5ff; padding: 10px; border: 3px solid #000; font-family: 'Bangers'; min-width: 60px; }

        .pop { position: fixed; font-size: 4rem; pointer-events: none; z-index: 10000; }
        
        .aberto { transform: translateY(-120%) !important; }
    </style>
</head>
<body>

    <div id="detectar-toque-total" onclick="explodirTudo(event)" ontouchstart="explodirTudo(event)"></div>

    <div id="tela-inicial">
        <div class="caixa-uau">
            <h2 class="texto-gigante">TOQUE PARA<br>VER A MÁGICA!</h2>
        </div>
        <div style="font-size: 6rem; margin-top: 30px;">🎉</div>
    </div>

    <main id="convite-final">
        <p style="font-family: 'Bangers'; color: #7000ff; letter-spacing: 3px;">SAVE THE DATE</p>
        <h1>GEOVANA & FELIPE</h1>
        <p style="font-weight: 900; margin-top: 10px;">IGREJA NOSSA SENHORA DAS DORES</p>
        <div class="timer">
            <div class="box"><span id="d">00</span><br>DIAS</div>
            <div class="box"><span id="h">00</span><br>HRS</div>
            <div class="box"><span id="m">00</span><br>MIN</div>
        </div>
        <button style="margin-top: 20px; width: 100%; background: #ff007f; color: #fff; border: 4px solid #000; padding: 15px; font-family: 'Bangers'; font-size: 1.8rem;">CONFIRMAR!</button>
    </main>

    <script>

            // Pega as coordenadas
            const x = e.clientX || (e.touches && e.touches[0].clientX);
            const y = e.clientY || (e.touches && e.touches[0].clientY);

                // Abre o convite
                document.getElementById('tela-inicial').classList.add('aberto');
                document.getElementById('convite-final').style.display = 'block';
                document.body.style.background = '#7000ff';
                jaFoi = true;
            }

            for(let i=0; i<15; i++) {
