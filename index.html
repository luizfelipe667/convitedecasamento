        :root {
            --gold: #d4af37;
            --dark: #0a0a0a;
            --silk: #fdfcf0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--dark);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 1000px;
            overflow: hidden;
            font-family: 'Playfair Display', serif;
        }

        /* --- ENVELOPE DE LUXO --- */
        #envelope-luxo {
            width: 320px;
            height: 220px;
            background: #1a1a1a;
            border: 1px solid var(--gold);
            position: relative;
            cursor: pointer;
            transition: transform 0.8s;
            z-index: 10;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 30px 50px rgba(0,0,0,0.8);
        }
