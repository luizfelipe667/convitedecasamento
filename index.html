<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Convite Real: Geovana & Felipe</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Great+Vibes&family=Montserrat:wght@300;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --gold-primary: #bf9b30;
            --gold-secondary: #e7d19a;
            --gold-dark: #8c6212;
            --bg-dark: #0a0a0a; /* Fundo preto para o dourado brilhar */
            --text-light: #ffffff;
            --font-cinzel: 'Cinzel Decorative', serif;
            --font-vibes: 'Great Vibes', cursive;
            --font-montserrat: 'Montserrat', sans-serif;
            --transition-epic: all 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        /* Reset e Base Otimizada para Celular */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { 
            height: 100%; 
            width: 100%; 
            background-color: var(--bg-dark); 
            font-family: var(--font-montserrat); 
            overflow: hidden; /* Previne scroll durante a animação inicial */
            color: var(--text-light);
        }

        /* --- CONTAINER PRINCIPAL DO CONVITE --- */
        .main-stage {
            perspective: 1500px; /* Necessário para efeito 3D */
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* --- O ENVELOPE (Fase 1: Fechado) --- */
        .envelope-wrapper {
            width: 100%;
            max-width: 400px;
            height: 80vh; /* Altura dramática no celular */
            background: radial-gradient(circle, #2a2a2a 0%, #1a1a1a 100%);
            border: 2px solid var(--gold-primary);
            border-radius: 10px;
            box-shadow: 0 0 50px rgba(191, 155, 48, 0.3);
            cursor: pointer;
            transition: var(--transition-epic);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            z-index: 10;
        }

        .envelope-wrapper.opened {
            transform: rotateX(180deg) scale(0.9);
            opacity: 0;
            pointer-events: none;
        }

        /* Brasão Exagerado no Envelope */
        .brasa-envelope {
            width: 120px;
            height: 120px;
            border: 4px solid var(--gold-secondary);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 30px;
            box-shadow: 0 0 30px var(--gold-dark);
            position: relative;
            animation: pulse-gold 2s infinite;
        }

        .brasa-envelope::after {
            content: "GF";
            font-family: var(--font-cinzel);
            font-size: 3rem;
            color: var(--gold-secondary);
            text-shadow: 0 0 10px var(--gold-primary);
        }

        .click-text {
            font-family: var(--font-cinzel);
            color: var(--gold-secondary);
            letter-spacing: 3px;
            font-size: 0.9rem;
            text-transform: uppercase;
        }

        /* --- O CONVITE INTERNO (Fase 2: Aberto) --- */
        .invite-content {
            position: absolute;
            width: 100%;
            max-width: 500px;
            height: 90vh;
            background-color: var(--bg-dark);
            background-image: 
                linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)),
                url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI0MCIgaGVpZ2h0PSI0MCIgdmlld0JveD0iMCAwIDQwIDQwIj48ZyBmaWxsLXJ1bGU9ImV2ZW5vZGQiPjxnIGZpbGw9IiNiZjl0MzAiIGZpbGwtb3BhY2l0eT0iMC4wNSI+PHBhdGggZD0iTTAgMGg0MHY0MEgwVjB6bTIwIDIwaDIwdjIwSDIWMjB6TTAgMjBoMjB2MjBIMFYyMHoyMCAwaDIwdjIwSDIwVjB6Ii8+PC9nPjwvZz48L3N2Zz4='); /* Textura sutil */
            border: 10px solid;
            border-image: linear-gradient(to bottom right, var(--gold-dark), var(--gold-secondary), var(--gold-dark)) 1;
            padding: 30px;
            text-align: center;
            opacity: 0;
            transform: scale(0.5) translateZ(-1000px);
            transition: var(--transition-epic);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            overflow-y: auto; /* Permite scroll interno se o texto for muito grande em celular pequeno */
            z-index: 5;
        }

        .invite-content.show {
            opacity: 1;
            transform: scale(1) translateZ(0px);
            overflow-y: auto;
        }

        /* --- TIPOGRAFIA DO CONVITE --- */
        .save-the-date {
            font-family: var(--font-cinzel);
            color: var(--gold-secondary);
            font-size: 1.1rem;
            letter-spacing: 5px;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .names {
            font-family: var(--font-vibes);
            font-size: 4rem; /* Gigante no celular */
            background: linear-gradient(to bottom, var(--gold-secondary) 0%, var(--gold-primary) 50%, var(--gold-dark) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px rgba(191, 155, 48, 0.8));
            margin: 10px 0;
            line-height: 1;
        }
        
        .ampersand {
            font-family: var(--font-cinzel);
            font-size: 2rem;
            -webkit-text-fill-color: var(--text-light); /* Respiro branco */
            display: block;
            margin: -10px 0;
        }

        .details-text {
            font-weight: 300;
            font-size: 1rem;
            line-height: 1.6;
            margin: 20px 0;
            color: #e0e0e0;
        }

        .highlight-gold {
            color: var(--gold-secondary);
            font-weight: 600;
        }

        /* --- CONTAGEM REGRESSIVA (EXAGERADA) --- */
        .countdown-container {
            margin: 20px 0;
            border-top: 1px solid var(--gold-dark);
            border-bottom: 1px solid var(--gold-dark);
            padding: 15px 0;
        }

        .countdown-timer {
            display: flex;
            justify-content: center;
            gap: 10px;
        }

        .time-box {
            background: linear-gradient(145deg, #1a1a1a, #000000);
            border: 1px solid var(--gold-primary);
            padding: 10px;
            min-width: 70px;
            border-radius: 8px;
            box-shadow: 0 0 15px rgba(191, 155, 48, 0.2);
        }

        .time-number {
            font-family: var(--font-cinzel);
            font-size: 2rem;
            font-weight: 900;
            color: var(--gold-secondary);
            display: block;
            text-shadow: 0 0 10px var(--gold-primary);
        }

        .time-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-light);
            opacity: 0.8;
        }

        /* --- BOTÃO DE CONFIRMAÇÃO (RSVP) --- */
        .rsvp-button {
            background: linear-gradient(to right, var(--gold-dark), var(--gold-primary), var(--gold-dark));
            color: #000;
            font-family: var(--font-cinzel);
            font-weight: 900;
            font-size: 1.1rem;
            text-transform: uppercase;
            border: none;
            padding: 18px;
            width: 100%;
            cursor: pointer;
            border-radius: 4px;
            letter-spacing: 3px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(140, 98, 18, 0.4);
        }

        .rsvp-button:active {
            transform: scale(0.95);
        }

        /* Efeito de Brilho Correndo no Botão */
        .rsvp-button::after {
            content: '';
            position: absolute;
            top: -50%; align-content: start; left: -50%;
            width: 200%; height: 200%;
            background: linear-gradient(rgba(255,255,255,0) 0%, rgba(255,255,255,0.5) 50%, rgba(255,255,255,0) 100%);
            transform: rotate(45deg);
            animation: shine-button 3s infinite;
        }

        @keyframes pulse-gold {
            0
