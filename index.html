<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Doutorinha</title>
    <style>
        /* RESET RADICAL - Impede zoom e scroll que travam o clique */
        * { 
            margin: 0; padding: 0; box-sizing: border-box; 
            touch-action: none; -webkit-tap-highlight-color: transparent; 
        }
        
        body, html { 
            width: 100%; height: 100%; 
            background: #ffffff; 
            display: flex; justify-content: center; align-items: center;
            font-family: 'Georgia', serif; overflow: hidden;
        }

        /* O GATILHO: Um botão real que ocupa a tela toda */
        #gatilho {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: transparent;
            border: none;
            z-index: 999;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #texto-guia {
            color: #d4af37;
            letter-spacing: 4px;
            font-size: 0.8rem;
            text-transform: uppercase;
            animation: piscar 1.5s infinite;
        }

        @keyframes piscar { 50% { opacity: 0.3; } }

        /* A FRASE FINAL */
        #mensagem {
            display: none;
            text-align: center;
            padding: 20px;
            z-index: 10;
        }

        h1 {
            font-size: 2.2rem;
            color: #1a1a1a;
            font-style: italic;
            font-weight: normal;
            border-bottom: 1px solid #d4af37;
            padding-bottom: 15px;
        }

        /* Partícula Luxuosa */
        .p { position: fixed; width: 4px; height: 4px; background: #d4af37; border-radius: 50%; pointer-events: none; }
    </style>
</head>
<body>

    <button id="gatilho" onclick="revelar()">
        <span id="texto-guia">Tocar no ecrã</span>
    </button>

    <div id="mensagem">
        <h1>"E ai, doutorinha. Gostou?"</h1>
    </div>

    <script>
        function revelar() {
            // Esconde o botão e mostra a frase instantaneamente
            document.getElementById('gatilho').style.display = 'none';
            document.getElementById('mensagem').style.display = 'block';

            // Muda o fundo para um tom perolado
            document.body.style.background = '#fdfcf0';

            // Cria um efeito de brilho central
            for(let i=0; i<30; i++) {
                const particle = document.createElement('div');
                particle.className = 'p';
                particle.style.left = '50%';
                particle.style.top = '50%';
                document.body.appendChild(particle);

                const x = (Math.random() - 0.5) * 400;
                const y = (Math.random() - 0.5) * 400;

                particle.animate([
                    { transform: 'translate(0,0) scale(1)', opacity: 1 },
                    { transform: `translate(${x}px, ${y}px) scale(0)`, opacity: 0 }
                ], { duration: 1200, easing: 'ease-out' }).onfinish = () => particle.remove();
            }
        }
    </script>
</body>
</html>
