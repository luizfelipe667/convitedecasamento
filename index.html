<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Convite: Geovana & Felipe</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Great+Vibes&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; overflow: hidden; background: #050505; font-family: 'Cinzel', serif; color: white; cursor: crosshair; }
        canvas { display: block; }

        #ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            pointer-events: none; text-align: center; z-index: 10;
        }

        .instruction {
            font-size: 1.2rem; letter-spacing: 5px; text-transform: uppercase;
            animation: pulse 2s infinite; opacity: 0.8;
        }

        #invite-card {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.8);
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px);
            padding: 40px; border: 1px solid rgba(212, 175, 55, 0.3); border-radius: 15px;
            box-shadow: 0 0 50px rgba(0,0,0,0.5), inset 0 0 20px rgba(212, 175, 55, 0.2);
            opacity: 0; pointer-events: none; width: 80%; max-width: 500px;
        }

        .names { font-family: 'Great Vibes', cursive; font-size: 4rem; color: #d4af37; margin: 10px 0; text-shadow: 0 0 10px rgba(212,175,55,0.5); }
        .details { font-size: 1rem; line-height: 1.8; letter-spacing: 2px; }
        .countdown { display: flex; justify-content: space-around; margin-top: 30px; border-top: 1px solid rgba(212,175,55,0.3); padding-top: 20px; }
        .countdown-item { display: flex; flex-direction: column; }
        .countdown-item span { font-size: 1.5rem; font-weight: bold; color: #d4af37; }

        @keyframes pulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div class="instruction" id="hint">Toque para despertar a magia</div>
        
        <div id="invite-card">
            <p>CONVIDAM PARA SEU CASAMENTO</p>
            <div class="names">Geovana & Felipe</div>
            <div class="details">
                01 DE JANEIRO DE 2026<br>
                IGREJA NOSSA SENHORA DA GLÓRIA<br>
                TERESINA - PI
            </div>
            <div class="countdown" id="timer">
                <div class="countdown-item"><span id="days">00</span>DIAS</div>
                <div class="countdown-item"><span id="hours">00</span>HORAS</div>
                <div class="countdown-item"><span id="mins">00</span>MIN</div>
            </div>
        </div>
    </div>

    <script>
        let scene, camera, renderer, crystal, particles, portal;
        let clicks = 0;
        const requiredClicks = 7;

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // Luzes
            const light = new THREE.PointLight(0xd4af37, 2, 100);
            light.position.set(0, 0, 10);
            scene.add(light);

            // Geometria do Cristal (Dodecaedro para look luxuoso)
            const geometry = new THREE.DodecahedronGeometry(1.5, 0);
            const material = new THREE.MeshPhongMaterial({
                color: 0x222222, emissive: 0xd4af37, emissiveIntensity: 0.2,
                shininess: 100, flatShading: true, transparent: true, opacity: 0.9
            });
            crystal = new THREE.Mesh(geometry, material);
            scene.add(crystal);

            // Partículas de Fundo
            const partGeom = new THREE.BufferGeometry();
            const partCount = 1500;
            const posArray = new Float32Array(partCount * 3);
            for(let i=0; i < partCount * 3; i++) posArray[i] = (Math.random() - 0.5) * 15;
            partGeom.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
            const partMat = new THREE.PointsMaterial({ size: 0.02, color: 0xd4af37, transparent: true, opacity: 0.5 });
            particles = new THREE.Points(partGeom, partMat);
            scene.add(particles);

            camera.position.z = 5;
            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            crystal.rotation.y += 0.01;
            crystal.rotation.x += 0.005;
            particles.rotation.y += 0.001;
            renderer.render(scene, camera);
        }

        // Interação de Clique
        window.addEventListener('mousedown', () => {
            if (clicks < requiredClicks) {
                clicks++;
                
                // Explosão Visual
                gsap.to(crystal.scale, { x: 1.5, y: 1.5, z: 1.5, duration: 0.1, yoyo: true, repeat: 1 });
                gsap.to(crystal.material, { emissiveIntensity: clicks * 0.8, duration: 0.2 });
                
                // Parallax/Movimento de impacto
                gsap.to(camera.position, { z: 4.8, duration: 0.1, yoyo: true, repeat: 1 });

                if (clicks === requiredClicks) {
                    revealInvite();
                }
            }
        });

        function revealInvite() {
            document.getElementById('hint').style.display = 'none';
            gsap.to(crystal.scale, { x: 0, y: 0, z: 0, duration: 1, ease: "back.in(1.7)" });
            gsap.to("#invite-card", { opacity: 1, scale: 1, duration: 1.5, ease: "power4.out", pointerEvents: "auto" });
        }

        // Parallax do Mouse
        window.addEventListener('mousemove', (e) => {
            const x = (e.clientX / window.innerWidth - 0.5) * 2;
            const y = (e.clientY / window.innerHeight - 0.5) * 2;
            gsap.to(crystal.rotation, { x: y, y: x, duration: 2 });
            gsap.to(scene.rotation, { y: x * 0.2, x: y * 0.1, duration: 2 });
        });

        // Countdown Logic
        function updateTimer() {
            const target = new Date("January 1, 2026 00:00:00").getTime();
            const now = new Date().getTime();
            const diff = target - now;

            const d = Math.floor(diff / (1000 * 60 * 60 * 24));
            const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));

            document.getElementById('days').innerText = d < 10 ? '0'+d : d;
            document.getElementById('hours').innerText = h < 10 ? '0'+h : h;
            document.getElementById('mins').innerText = m < 10 ? '0'+m : m;
        }
        setInterval(updateTimer, 1000);

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        init();
        updateTimer();
    </script>
</body>
</html>
