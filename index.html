<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>A GRANDE FESTA: Geovana & Felipe</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Pacifico&family=Poppins:wght@400;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --pink: #ff007f;
            --blue: #00e5ff;
            --yellow: #ffee00;
            --purple: #9d00ff;
            --orange: #ff9100;
            --text-dark: #202020;
            --font-cartoon: 'Bangers', cursive;
            --font-script: 'Pacifico', cursive;
            --font-main: 'Poppins', sans-serif;
            --transition-bounce: all 0.6s cubic-bezier(0.68, -0.55, 0.27, 1.55);
        }

        /* --- RESET E BASE VIBRANTE --- */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body, html { 
            height: 100%; 
            width: 100%; 
            font-family: var(--font-main); 
            overflow: hidden; /* Controlamos o scroll manualmente */
            color: var(--text-dark);
            /* Fundo Gradiente Animado */
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
        }

        /* --- ANIMAÇÕES DE FUNDO E ELEMENTOS VOADORES --- */
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        
        @keyframes float { 
            0% { transform: translate(0, 0) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translate(100px, -1000px) rotate(360deg); opacity: 0; }
        }

        /* Classe para Elementos Voadores (Confetes, Estrelas, etc.) */
        .floating-element {
            position: fixed;
            pointer-events: none;
            z-index: 1;
            animation: float 10s linear infinite;
        }

        /* --- CONTAINER PRINCIPAL (ESTILO CARTOON) --- */
        .main-stage {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            z-index: 10;
        }

        /* --- FASE 1: INSTRUÇÕES E O PRIMEIRO CLIQUE (CAIXA DE SOM BOMBANDO) --- */
        .interaction-box {
            width: 100%;
            max-width: 350px;
            background: #fff;
            border: 10px solid var(--text-dark);
            border-radius: 20px;
            box-shadow: 15px 15px 0 var(--purple);
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: var(--transition-bounce);
            position: relative;
            animation: pulseBox 1.5s infinite;
        }

        .interaction-box:active { transform: scale(0.9) rotate(-3deg); box-shadow: 5px 5px 0 var(--purple); }

        @keyframes pulseBox { 
            0% { transform: scale(1); box-shadow: 15px 15px 0 var(--purple); }
            50% { transform: scale(1.05); box-shadow: 20px 20px 0 var(--purple); }
            100% { transform: scale(1); box-shadow: 15px 15px 0 var(--purple); }
        }

        .instruction-title {
            font-family: var(--font-cartoon);
            font-size: 2.5rem;
            color: var(--pink);
            text-transform: uppercase;
            letter-spacing: 2px;
            -webkit-text-stroke: 1px var(--text-dark);
            text-shadow: 4px 4px 0 var(--yellow);
            margin-bottom: 15px;
        }

        .instruction-text {
            font-size: 1.1rem;
            font-weight: 700;
            line-height: 1.4;
            color: var(--text-dark);
            margin-bottom: 20px;
        }

        .finger-icon { font-size: 3rem; animation: pointFinger 1s infinite; display: inline-block; }
        @keyframes pointFinger { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(10px); } }

        /* --- O CONVITE (ESCONDIDO) --- */
        .invite-content {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            display: none;
            justify-content: center;
            align-items: center;
            padding: 20px;
            z-index: 100;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .invite-content.show { display: flex; opacity: 1; }

            width: 100%;
            max-width: 450px;
            height: 90vh;
            background: #fff;
            border: 10px solid
