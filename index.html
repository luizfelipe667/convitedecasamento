<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Geovana & Felipe</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
height:100vh;
overflow:hidden;
background:radial-gradient(circle at center,#0d0d0d,#000);
font-family:'Montserrat',sans-serif;
color:white;
display:flex;
justify-content:center;
align-items:center;
}

/* PARTÍCULAS FUNDO */
.particle{
position:absolute;
width:2px;height:2px;
background:gold;
border-radius:50%;
opacity:.5;
animation:float linear infinite;
}
@keyframes float{
0%{transform:translateY(100vh);opacity:0;}
20%{opacity:1;}
100%{transform:translateY(-10vh);opacity:0;}
}

/* TEXTO INICIAL */
.intro{
position:absolute;
text-align:center;
animation:pulse 2s infinite;
letter-spacing:2px;
font-size:14px;
opacity:.8;
}
@keyframes pulse{
0%{opacity:.3;}
50%{opacity:1;}
100%{opacity:.3;}
}

/* PORTAL */
.portal{
width:180px;height:180px;
border-radius:50%;
border:4px solid gold;
box-shadow:0 0 30px gold, inset 0 0 40px rgba(212,175,55,.4);
animation:spin 6s linear infinite;
cursor:pointer;
display:none;
}
@keyframes spin{
to{transform:rotate(360deg);}
}

/* ENERGIA */
.energy{
position:absolute;
width:200px;height:200px;
border-radius:50%;
background:radial-gradient(circle,rgba(212,175,55,.4),transparent 70%);
opacity:0;
transition:.3s;
}

/* FLASH */
.flash{
position:absolute;
width:100%;height:100%;
background:white;
opacity:0;
pointer-events:none;
}

/* PLACA FINAL */
.invite{
position:absolute;
width:90%;
max-width:380px;
padding:60px 30px;
background:linear-gradient(145deg,#111,#1c1c1c);
border-radius:20px;
box-shadow:0 0 40px rgba(212,175,55,.5),
0 60px 120px rgba(0,0,0,.9);
text-align:center;
transform:scale(0) rotateY(90deg);
transition:1.2s cubic-bezier(.22,1,.36,1);
}

.invite.show{
transform:scale(1) rotateY(0deg);
}

/* NOMES */
.names{
font-family:'Playfair Display',serif;
font-size:36px;
background:linear-gradient(90deg,#d4af37,#fff5cc,#d4af37);
background-size:200% auto;
color:transparent;
-webkit-background-clip:text;
animation:shine 4s linear infinite;
margin-bottom:20px;
}
@keyframes shine{
to{background-position:200% center;}
}

.date{color:#d4af37;font-weight:600;margin-bottom:10px;}
.location{margin-bottom:20px;}
.countdown{font-size:13px;margin-bottom:25px;}

/* BOTÃO */
.map-btn{
display:inline-block;
padding:14px 30px;
border-radius:40px;
background:linear-gradient(45deg,#b08d57,#d4af37);
color:black;
text-decoration:none;
font-size:13px;
box-shadow:0 0 20px rgba(212,175,55,.7);
transition:.3s;
}
.map-btn:active{transform:scale(.95);}

</style>
</head>
<body>

<div class="intro" id="intro">TOQUE NA TELA PARA REVELAR O DESTINO</div>

<div class="portal" id="portal"></div>
<div class="energy" id="energy"></div>
<div class="flash" id="flash"></div>

<div class="invite" id="invite">
<div class="names">Geovana Lima<br>&<br>Felipe</div>
<div class="date">01 de Janeiro de 2026</div>
<div class="location">Igreja Nossa Senhora da Glória</div>
<div class="countdown" id="countdown"></div>

<a class="map-btn" target="_blank"
href="https://www.google.com/maps/search/?api=1&query=Igreja+Nossa+Senhora+da+Glória">
Ver Localização
</a>
</div>

<script>

const intro=document.getElementById("intro");
const portal=document.getElementById("portal");
const invite=document.getElementById("invite");
const flash=document.getElementById("flash");
const energy=document.getElementById("energy");

let clicks=0;

/* Fundo partículas */
function createParticle(){
const p=document.createElement("div");
p.className="particle";
p.style.left=Math.random()*100+"vw";
p.style.animationDuration=(6+Math.random()*6)+"s";
document.body.appendChild(p);
setTimeout(()=>p.remove(),12000);
}
setInterval(createParticle,400);

/* Primeira interação */
document.body.addEventListener("click",()=>{
if(clicks===0){
intro.style.display="none";
portal.style.display="block";
}
if(portal.style.display==="block"){
clicks++;
energy.style.opacity=clicks*0.3;

if(clicks>=3){
explode();
portal.style.display="none";
energy.style.opacity=0;
setTimeout(()=>{
invite.classList.add("show");
},500);
}
}
});

/* Explosão */
function explode(){
flash.style.opacity=1;
flash.style.transition="opacity .5s";
setTimeout(()=>flash.style.opacity=0,400);
}

/* Countdown */
function updateCountdown(){
const date=new Date("January 1, 2026 00:00:00").getTime();
const now=new Date().getTime();
const diff=date-now;

if(diff>0){
const d=Math.floor(diff/(1000*60*60*24));
const h=Math.floor((diff%(1000*60*60*24))/(1000*60*60));
const m=Math.floor((diff%(1000*60*60))/(1000*60));
const s=Math.floor((diff%(1000*60))/1000);
document.getElementById("countdown").innerHTML=
"Faltam "+d+" dias • "+h+"h "+m+"m "+s+"s";
}else{
document.getElementById("countdown").innerHTML="Hoje é o grande dia ✨";
}
}
setInterval(updateCountdown,1000);
updateCountdown();

</script>

</body>
</html>
