<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GEOVANA & FELIPE 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body, html { 
            width: 100%; height: 100%; 
            background: #121212; 
            overflow: hidden; 
            font-family: 'Arial', sans-serif;
        }

        /* FUNDO DINÂMICO PARA MOSTRAR QUE ESTÁ VIVO */
        #game-canvas {
            position: fixed;
            inset: 0;
            background: linear-gradient(45deg, #ff007f, #7000ff, #00e5ff);
            background-size: 400% 400%;
            animation: gradientMove 10s ease infinite;
            z-index: 1;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* INSTRUÇÃO GIGANTE ESTILO ARCADE */
        #overlay-instrucao {
            position: fixed;
            inset: 0;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            pointer-events: none; /* Deixa o toque passar para o fundo */
        }

        .alerta-cartoon {
            background: #ffee00;
            border: 10px solid #000;
            padding: 20px;
            box-shadow: 15px 15px 0 #000;
            font-family: 'Bangers', cursive;
            font-size: 2rem;
            text-align: center;
            transform: rotate(-3deg);
            animation: pulse 0.6s infinite alternate;
        }

        @keyframes pulse {
            from { transform: rotate(-3deg) scale(1); }
            to { transform: rotate(3deg) scale(1.1); }
        }

        /* O CONVITE QUE SURGE DO NADA */
        #convite-voador {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%) scale(0);
            width: 85%;
            max-width: 350px;
            background: #fff;
            border: 8px solid #000;
            padding: 20px;
            text-align: center;
            z-index: 500;
            transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 10px 10px 0 #ffee00;
        }

        .show-convite { transform: translate(-50%, -50%) scale(1) !important; }

        h1 { font-family: 'Bangers', cursive; font-size: 2.5rem; color: #ff007f; -webkit-text-stroke: 1px #000; }
        .data { font-family: 'Press Start 2P', cursive; font-size: 0.6rem; margin: 15px 0; line-height: 1.5; }

        /* PARTÍCULAS DE DESENHO ANIMADO */
        .sprite {
            position: fixed;
            pointer-events: none;
            z-index: 2000;
            font-size: 4rem;
            filter: drop-shadow(5px 5px 0 #000);
        }
    </style>
</head>
