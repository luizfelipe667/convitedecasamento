<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Geovana & Felipe</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
height:100vh;
overflow:hidden;
background:radial-gradient(circle at center,#111,#000);
display:flex;
justify-content:center;
align-items:center;
font-family:'Montserrat',sans-serif;
color:white;
}

/* FUNDO PARTÍCULAS */
.particle{
position:absolute;
width:3px;
height:3px;
background:gold;
border-radius:50%;
opacity:.6;
animation:float linear infinite;
}

@keyframes float{
0%{transform:translateY(100vh);opacity:0;}
20%{opacity:1;}
100%{transform:translateY(-10vh);opacity:0;}
}

/* CRISTAL 3D */
.crystal{
width:150px;
height:150px;
background:linear-gradient(135deg,#d4af37,#fff5cc,#b08d57);
clip-path:polygon(50% 0%, 90% 25%, 100% 70%, 50% 100%, 0% 70%, 10% 25%);
animation:spin 6s linear infinite;
cursor:pointer;
box-shadow:0 0 40px gold;
transition:transform .3s ease;
}

.crystal:active{
transform:scale(.9);
}

@keyframes spin{
from{transform:rotateY(0deg) rotateX(0deg);}
to{transform:rotateY(360deg) rotateX(360deg);}
}

/* EXPLOSÃO */
.fragment{
position:absolute;
width:8px;
height:8px;
background:gold;
border-radius:2px;
pointer-events:none;
animation:explode 1s ease-out forwards;
}

@keyframes explode{
to{
transform:translate(var(--x),var(--y)) rotate(720deg);
opacity:0;
}
}

/* FLASH */
.flash{
position:absolute;
width:100%;
height:100%;
background:white;
opacity:0;
pointer-events:none;
}

/* PLACA 3D */
.invite{
position:absolute;
width:90%;
max-width:380px;
padding:50px 30px;
background:linear-gradient(145deg,#1c1c1c,#111);
border-radius:20px;
box-shadow:
0 0 40px rgba(212,175,55,.5),
0 40px 100px rgba(0,0,0,.8);
text-align:center;
transform:scale(0) rotateX(90deg);
transition:1.2s cubic-bezier(.22,1,.36,1);
}

.invite.show{
transform:scale(1) rotateX(0deg);
}

.names{
font-family:'Playfair Display',serif;
font-size:34px;
background:linear-gradient(90deg,#d4af37,#fff5cc,#d4af37);
background-size:200% auto;
color:transparent;
-webkit-background-clip:text;
animation:shine 4s linear infinite;
margin-bottom:20px;
}

@keyframes shine{
to{background-position:200% center;}
}

.date{
color:#d4af37;
font-weight:600;
margin-bottom:10px;
}

.location{
margin-bottom:20px;
}

.countdown{
font-size:13px;
margin-bottom:25px;
}

/* BOTÃO */
.map-btn{
display:inline-block;
padding:12px 28px;
border-radius:30px;
background:linear-gradient(45deg,#b08d57,#d4af37);
color:black;
text-decoration:none;
font-size:13px;
box-shadow:0 0 20px rgba(212,175,55,.7);
transition:.3s;
}

.map-btn:active{
transform:scale(.95);
}

</style>
</head>
<body>

<div class="crystal" id="crystal"></div>
<div class="flash" id="flash"></div>

<div class="invite" id="invite">
<div class="names">Geovana Lima<br>&<br>Felipe</div>
<div class="date">01 de Janeiro de 2026</div>
<div class="location">Igreja Nossa Senhora da Glória</div>
<div class="countdown" id="countdown"></div>

<a class="map-btn" target="_blank"
href="https://www.google.com/maps/search/?api=1&query=Igreja+Nossa+Senhora+da+Glória">
Ver Localização
</a>
</div>

<script>

const crystal=document.getElementById("crystal");
const invite=document.getElementById("invite");
const flash=document.getElementById("flash");

/* Clique cristal */
crystal.addEventListener("click",()=>{

explode();
flashEffect();

crystal.style.display="none";

setTimeout(()=>{
invite.classList.add("show");
},500);

});

/* Explosão */
function explode(){
for(let i=0;i<60;i++){
const frag=document.createElement("div");
frag.className="fragment";
frag.style.left="50%";
frag.style.top="50%";
frag.style.setProperty('--x',(Math.random()*600-300)+'px');
frag.style.setProperty('--y',(Math.random()*600-300)+'px');
document.body.appendChild(frag);
setTimeout(()=>frag.remove(),1000);
}
}

/* Flash */
function flashEffect(){
flash.style.opacity="1";
flash.style.transition="opacity .5s";
setTimeout(()=>flash.style.opacity="0",300);
}

/* Partículas fundo */
function createParticle(){
const p=document.createElement("div");
p.className="particle";
p.style.left=Math.random()*100+"vw";
p.style.animationDuration=(8+Math.random()*6)+"s";
document.body.appendChild(p);
setTimeout(()=>p.remove(),14000);
}
setInterval(createParticle,500);

/* Countdown */
function updateCountdown(){
const date=new Date("January 1, 2026 00:00:00").getTime();
const now=new Date().getTime();
const diff=date-now;

if(diff>0){
const d=Math.floor(diff/(1000*60*60*24));
const h=Math.floor((diff%(1000*60*60*24))/(1000*60*60));
const m=Math.floor((diff%(1000*60*60))/(1000*60));
const s=Math.floor((diff%(1000*60))/1000);
document.getElementById("countdown").innerHTML=
"Faltam "+d+" dias • "+h+"h "+m+"m "+s+"s";
}else{
document.getElementById("countdown").innerHTML="Hoje é o grande dia ✨";
}
}
setInterval(updateCountdown,1000);
updateCountdown();

</script>

</body>
</html>
