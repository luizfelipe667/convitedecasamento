<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Geovana & Felipe</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
height:100vh;
overflow:hidden;
font-family:'Montserrat',sans-serif;
background:#f4f1ed;
display:flex;
justify-content:center;
align-items:center;
}

/* FUNDO MÁRMORE ANIMADO */
.background{
position:absolute;
width:200%;
height:200%;
background:
radial-gradient(circle at 30% 30%,rgba(255,255,255,0.6),transparent 60%),
radial-gradient(circle at 70% 70%,rgba(0,0,0,0.05),transparent 60%),
linear-gradient(120deg,#f2ede8,#e6ddd5,#f2ede8);
animation:moveBg 20s infinite alternate ease-in-out;
}

@keyframes moveBg{
0%{transform:translate(-5%,-5%) rotate(0deg);}
100%{transform:translate(5%,5%) rotate(2deg);}
}

/* PARTÍCULAS FLUTUANTES */
.particle{
position:absolute;
width:3px;
height:3px;
background:rgba(212,175,55,0.7);
border-radius:50%;
animation:float linear infinite;
}

@keyframes float{
0%{transform:translateY(100vh);opacity:0;}
20%{opacity:1;}
100%{transform:translateY(-10vh);opacity:0;}
}

/* CARD PRINCIPAL */
.card{
position:relative;
width:90%;
max-width:380px;
padding:50px 30px;
background:rgba(255,255,255,0.75);
backdrop-filter:blur(10px);
border-radius:20px;
box-shadow:0 40px 100px rgba(0,0,0,0.25);
text-align:center;
transform-style:preserve-3d;
transition:transform .2s ease;
animation:fadeUp 1.5s ease forwards;
opacity:0;
}

@keyframes fadeUp{
to{
opacity:1;
transform:translateY(0);
}
}

/* NOMES DOURADOS */
.names{
font-family:'Playfair Display',serif;
font-size:34px;
background:linear-gradient(90deg,#b08d57,#fff5cc,#b08d57);
background-size:200% auto;
color:transparent;
-webkit-background-clip:text;
animation:shine 4s linear infinite;
margin-bottom:15px;
}

@keyframes shine{
to{background-position:200% center;}
}

.subtitle{
font-size:14px;
letter-spacing:2px;
margin-bottom:25px;
color:#444;
}

.date{
font-weight:600;
color:#b08d57;
margin-bottom:10px;
}

.location{
margin-bottom:20px;
}

.countdown{
font-size:13px;
margin-bottom:25px;
}

/* BOTÃO */
.map-btn{
display:inline-block;
padding:12px 28px;
border-radius:30px;
background:linear-gradient(45deg,#b08d57,#d4af37);
color:white;
text-decoration:none;
font-size:13px;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
transition:.3s;
}

.map-btn:active{
transform:scale(.95);
}

</style>
</head>
<body>

<div class="background"></div>

<div class="card" id="card">
<div class="names">Geovana Lima<br>&<br>Felipe</div>
<div class="subtitle">CONVIDAM PARA CELEBRAR O AMOR</div>

<div class="date">01 de Janeiro de 2026</div>
<div class="location">Igreja Nossa Senhora da Glória</div>

<div class="countdown" id="countdown"></div>

<a class="map-btn" target="_blank"
href="https://www.google.com/maps/search/?api=1&query=Igreja+Nossa+Senhora+da+Glória">
Ver Localização
</a>
</div>

<script>

/* Parallax 3D suave */
const card=document.getElementById("card");
document.addEventListener("mousemove",(e)=>{
const x=(window.innerWidth/2-e.clientX)/40;
const y=(window.innerHeight/2-e.clientY)/40;
card.style.transform=`rotateY(${x}deg) rotateX(${y}deg)`;
});

/* Partículas douradas flutuantes */
function createParticle(){
const p=document.createElement("div");
p.className="particle";
p.style.left=Math.random()*100+"vw";
p.style.animationDuration=(8+Math.random()*6)+"s";
document.body.appendChild(p);
setTimeout(()=>p.remove(),14000);
}
setInterval(createParticle,700);

/* Countdown */
function updateCountdown(){
const date=new Date("January 1, 2026 00:00:00").getTime();
const now=new Date().getTime();
const diff=date-now;

if(diff>0){
const d=Math.floor(diff/(1000*60*60*24));
const h=Math.floor((diff%(1000*60*60*24))/(1000*60*60));
const m=Math.floor((diff%(1000*60*60))/(1000*60));
const s=Math.floor((diff%(1000*60))/1000);
document.getElementById("countdown").innerHTML=
"Faltam "+d+" dias • "+h+"h "+m+"m "+s+"s";
}else{
document.getElementById("countdown").innerHTML="Hoje é o grande dia ✨";
}
}
setInterval(updateCountdown,1000);
updateCountdown();

</script>

</body>
</html>
