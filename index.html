<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Surpresa Especial</title>
    <style>
        /* RESET PARA EVITAR TELA PRETA */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body, html { 
            width: 100%; height: 100%; 
            background: #ffffff; /* FUNDO BRANCO OBRIGATÓRIO */
            overflow: hidden; 
            font-family: 'Times New Roman', serif; /* Fonte clássica nativa */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* ENVELOPE DOURADO */
        #envelope-wrapper {
            width: 300px;
            height: 200px;
            background: #fdfcf0; /* Creme */
            border: 2px solid #d4af37; /* Dourado */
            position: relative;
            cursor: pointer;
            z-index: 100;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 10px 30px rgba(212, 175, 55, 0.3);
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Lacre Dourado */
        .lacre {
            width: 50px;
            height: 50px;
            background: #d4af37;
            border-radius: 50%;
            border: 2px solid #b8860b;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-weight: bold;
            font-size: 1.2rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        /* A CARTA (FICA ESCONDIDA DENTRO) */
        #carta-luxo {
            position: absolute;
            width: 280px;
            background: white;
            border: 1px solid #d4af37;
            padding: 40px 20px;
            text-align: center;
            transform: translateY(100%) scale(0.8);
            opacity: 0;
            z-index: 50;
            transition: all 0.8s ease-out;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }

        .texto-principal {
            font-size: 1.6rem;
            color: #333;
            line-height: 1.4;
            font-style: italic;
            margin-bottom: 20px;
        }

        .detalhe-dourado {
            width: 40px;
            height: 2px;
            background: #d4af37;
            margin: 0 auto 20px;
        }

        /* ANIMAÇÕES */
        .abrir-envelope {
            transform: translateY(-150%) rotate(10deg) !important;
            opacity: 0;
        }

        .subir-carta {
            transform: translateY(0) scale(1.1) !important;
            opacity: 1 !important;
        }

        /* Brilhos Dourados */
        .sparkle {
            position: fixed;
            width: 6px;
            height: 6px;
            background: #d4af37;
            border-radius: 50%;
            pointer-events: none;
            z-index: 200;
        }
    </style>
</head>

        <div class="lacre">GF</div>
        <p style="position: absolute; bottom: 15px; font-size: 0.7rem; color: #d4af37; letter-spacing: 2px;">TOQUE PARA ABRIR</p>
    </div>

    <div id="carta-luxo">
        <div class="detalhe-dourado"></div>
        <h1 class="texto-principal">"E aí, doutorinha, gostou?"</h1>
        <p style="color: #d4af37; font-size: 0.8rem; letter-spacing: 3px;">GEOVANA & FELIPE</p>
    </div>
