<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GEOVANA & FELIPE 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Luckiest+Guy&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: #000;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
            height: 100vh;
            width: 100vw;
            touch-action: none;
        }

        /* --- CAMADA 1: A CORTINA DE DESENHO ANIMADO --- */
        #curtain-layer {
            position: fixed;
            inset: 0;
            background: #ff007f;
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border: 15px solid #ffee00;
            transition: all 0.8s cubic-bezier(0.9, 0, 0.1, 1);
        }

        .instruction-box {
            background: #fff;
            border: 8px solid #000;
            padding: 20px;
            transform: rotate(-5deg);
            box-shadow: 15px 15px 0 #00e5ff;
            text-align: center;
            animation: shake 0.5s infinite;
        }

        @keyframes shake {
            0% { transform: rotate(-5deg) scale(1); }
            50% { transform: rotate(5deg) scale(1.1); }
            100% { transform: rotate(-5deg) scale(1); }
        }

        .instruction-box h2 {
            font-family: 'Bangers', cursive;
            font-size: 2.5rem;
            color: #ff007f;
        }

        /* --- CAMADA 2: O CONVITE CINEMATOGRÁFICO --- */
        #invite-layer {
            position: fixed;
            inset: 0;
            background: linear-gradient(135deg, #7000ff, #ff007f);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            z-index: 50;
        }

        .main-card {
            background: #fff;
            border: 10px solid #000;
            padding: 40px 20px;
            width: 100%;
            max-width: 380px;
            box-shadow: 20px 20px 0 #ffee00;
            text-align: center;
            position: relative;
        }

        h1 {
            font-family: 'Luckiest Guy', cursive;
            font-size: 3.5rem;
            color: #ff007f;
            -webkit-text-stroke: 2px #000;
            line-height: 0.9;
            margin-bottom: 20px;
        }

        .church {
            font-family: 'Bangers', cursive;
            font-size: 1.5rem;
            color: #00e5ff;
            background: #000;
            padding: 10px;
            display: inline-block;
            margin-top: 10px;
        }

        /* --- CONTAGEM REGRESSIVA VIBRANTE --- */
        .timer {
            display: flex;
            gap: 10px;
            margin-top: 25px;
            justify-content: center;
        }

        .unit {
            background: #ffee00;
            border: 4px solid #000;
            padding: 10px;
            min-width: 70px;
            font-family: 'Bangers', cursive;
        }

        .unit span { font-size: 2rem; display: block; color: #000; }

        /* --- ELEMENTOS VOADORES --- */
        .particle {
            position: fixed;
            pointer-events: none;
            z-index: 200;
            font-size: 3rem;
        }

        /* --- ESTADO QUANDO ABRE --- */
        .opened {
            transform: translateY(-120%) rotate(20deg) !important;
            opacity: 0;
        }
    </style>
</head>

        </button>
